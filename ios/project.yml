name: NewEra
options:
  bundleIdPrefix: com.newera
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.2"

targets:
  NewEra:
    type: application
    platform: iOS
    sources:
      - Sources/NewEra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.newera.expenses
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/NewEra/Info.plist
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: Sources/NewEra/NewEra.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.newera.expenses
